<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>后端架构参考手册</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-light.min.css" />
  <style>
    :root { --sidebar: 240px; --accent: #2563eb; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: #f8fafc; }
    header {
      position: sticky; top: 0; z-index: 10;
      background: #fff; border-bottom: 1px solid #e2e8f0;
      padding: 12px 24px; display: flex; align-items: center; gap: 16px;
    }
    header h1 { font-size: 1.1rem; margin: 0; flex: 1; }
    header button, header a.btn {
      padding: 6px 12px; border-radius: 6px; border: 1px solid #cbd5e1;
      background: #fff; cursor: pointer; font-size: 0.85rem; text-decoration: none; color: inherit;
    }
    header button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .layout { display: flex; min-height: calc(100vh - 52px); }
    nav#toc {
      width: var(--sidebar); flex-shrink: 0; background: #fff;
      border-right: 1px solid #e2e8f0; padding: 16px; overflow-y: auto;
      position: sticky; top: 52px; height: calc(100vh - 52px);
    }
    nav#toc a {
      display: block; padding: 4px 8px; color: #475569; text-decoration: none;
      font-size: 0.85rem; border-radius: 4px;
    }
    nav#toc a:hover { background: #f1f5f9; color: var(--accent); }
    nav#toc a.h2 { font-weight: 600; margin-top: 8px; }
    nav#toc a.h3 { padding-left: 16px; }
    main { flex: 1; padding: 24px 32px 64px; overflow-x: auto; }
    .markdown-body { max-width: 960px; margin: 0 auto; background: #fff;
      padding: 32px; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .loading { color: #64748b; padding: 48px; text-align: center; }
    .error { color: #dc2626; padding: 24px; }
    @media (max-width: 768px) {
      nav#toc { display: none; }
      main { padding: 16px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>后端架构参考手册</h1>
    <span id="gen-time" style="font-size:0.8rem;color:#64748b"></span>
    <button type="button" onclick="loadDoc()">刷新</button>
    <a class="btn" href="后端架构参考手册.md" download>下载 Markdown</a>
  </header>
  <div class="layout">
    <nav id="toc"></nav>
    <main>
      <article id="content" class="markdown-body">
        <p class="loading">加载文档中…</p>
      </article>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'neutral' });

    async function loadDoc() {
      const el = document.getElementById('content');
      el.innerHTML = '<p class="loading">加载文档中…</p>';
      try {
        const res = await fetch('后端架构参考手册.md?_=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const md = await res.text();
        const timeMatch = md.match(/最后生成时间：`([^`]+)`/);
        document.getElementById('gen-time').textContent = timeMatch ? '生成于 ' + timeMatch[1] : '';
        el.innerHTML = marked.parse(md);
        buildToc(el);
        await renderMermaid(el);
      } catch (e) {
        el.innerHTML = '<p class="error">无法加载文档。请通过本地 HTTP 服务打开（如 <code>python -m http.server 8080</code>，访问 docs/ 目录），或直接查看 Markdown 文件。<br><br>' + e.message + '</p>';
      }
    }

    function buildToc(root) {
      const toc = document.getElementById('toc');
      toc.innerHTML = '';
      root.querySelectorAll('h2, h3').forEach(h => {
        if (!h.id) h.id = h.textContent.trim().replace(/\s+/g, '-').replace(/[^\w\u4e00-\u9fff-]/g, '');
        const a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent;
        a.className = h.tagName.toLowerCase();
        toc.appendChild(a);
      });
    }

    async function renderMermaid(root) {
      const blocks = root.querySelectorAll('pre code.language-mermaid, pre > code');
      for (const code of blocks) {
        const text = code.textContent.trim();
        if (!text.startsWith('stateDiagram') && !text.startsWith('graph') && !text.startsWith('flowchart')) continue;
        const div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = text;
        code.closest('pre').replaceWith(div);
      }
      await mermaid.run({ querySelector: '.mermaid' });
    }

    loadDoc();
  </script>
</body>
</html>
